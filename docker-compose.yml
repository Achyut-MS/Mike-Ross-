# docker-compose.yml
# Local development environment for EvidenceChain

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: evidencechain_postgres
    environment:
      POSTGRES_DB: evidencechain
      POSTGRES_USER: evidencechain_user
      POSTGRES_PASSWORD: dev_password_change_in_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidencechain_user -d evidencechain"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for Celery)
  redis:
    image: redis:7-alpine
    container_name: evidencechain_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: evidencechain_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: evidencechain_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8080"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8080:8080"
    environment:
      # Django
      DEBUG: "True"
      SECRET_KEY: "dev-secret-key-change-in-production"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      
      # Database
      DATABASE_URL: "postgresql://evidencechain_user:dev_password_change_in_prod@postgres:5432/evidencechain"
      
      # OpenAI
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_MODEL: "gpt-4o"
      
      # AWS (LocalStack for dev, real AWS for prod)
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-test}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-test}"
      AWS_S3_BUCKET_UPLOADS: "evidencechain-uploads-dev"
      AWS_S3_REGION: "ap-south-1"
      AWS_S3_ENDPOINT_URL: "http://localstack:4566"  # LocalStack for dev
      
      # Redis/Celery
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      
      # ChromaDB
      CHROMA_HOST: "chromadb"
      CHROMA_PORT: "8000"
      CHROMA_PERSIST_DIRECTORY: "/chroma_data"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: evidencechain_celery
    command: celery -A evidencechain worker -l info --concurrency=4
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    environment:
      # Same as backend
      DATABASE_URL: "postgresql://evidencechain_user:dev_password_change_in_prod@postgres:5432/evidencechain"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-test}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-test}"
      AWS_S3_BUCKET_UPLOADS: "evidencechain-uploads-dev"
      AWS_S3_ENDPOINT_URL: "http://localstack:4566"
      CHROMA_HOST: "chromadb"
      CHROMA_PORT: "8000"
    depends_on:
      - redis
      - postgres
      - backend

  # Celery Beat (Scheduled Tasks)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: evidencechain_celery_beat
    command: celery -A evidencechain beat -l info
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: "postgresql://evidencechain_user:dev_password_change_in_prod@postgres:5432/evidencechain"
      CELERY_BROKER_URL: "redis://redis:6379/0"
    depends_on:
      - redis
      - postgres
      - backend

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: evidencechain_frontend
    command: npm start
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: "http://localhost:8080/api/v1"
      REACT_APP_WS_URL: "ws://localhost:8080/ws"
      CHOKIDAR_USEPOLLING: "true"  # For hot reload in Docker
    depends_on:
      - backend

  # LocalStack (AWS Services Emulation for Dev)
  localstack:
    image: localstack/localstack:latest
    container_name: evidencechain_localstack
    ports:
      - "4566:4566"  # LocalStack Gateway
      - "4510-4559:4510-4559"  # External services port range
    environment:
      SERVICES: "s3"
      DEBUG: "1"
      DATA_DIR: "/tmp/localstack/data"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      - localstack_data:/tmp/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
      - ./localstack_init:/docker-entrypoint-initaws.d

  # Nginx (Reverse Proxy for Production-like Setup)
  nginx:
    image: nginx:alpine
    container_name: evidencechain_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  localstack_data:
  static_volume:
  media_volume:

networks:
  default:
    name: evidencechain_network
